    <script type="text/babel">
        const { useState, useEffect } = React;

        const STORAGE_KEY = 'casa_tio_v16_completo';
        
        const mascaraTelefone = (v) => {
            v = v.replace(/\D/g, '');
            if (v.length <= 10) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1)$2-$3');
            else v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, '($1)$2-$3');
            return v;
        };
        
        const mascaraCPF = (v) => {
            v = v.replace(/\D/g, '');
            v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
            return v;
        };
        
        const mascaraRG = (v) => {
            v = v.replace(/\D/g, '');
            v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{0,1})/, '$1.$2.$3-$4');
            return v;
        };
        
        const mascaraData = (v) => {
            v = v.replace(/\D/g, '');
            if (v.length <= 2) return v;
            if (v.length <= 4) return v.replace(/(\d{2})(\d{0,2})/, '$1/$2');
            return v.replace(/(\d{2})(\d{2})(\d{0,4})/, '$1/$2/$3');
        };
        
        const mascaraCEP = (v) => {
            v = v.replace(/\D/g, '');
            return v.replace(/(\d{5})(\d{0,3})/, '$1-$2');
        };

        const salvar = async (d) => {
            try {
                // Salva cada coleção separadamente no Firestore
                const batch = db.batch();
                const ref = db.collection('dados').doc('principal');
                batch.set(ref, {
                    cadastros: JSON.stringify(d.cadastros || []),
                    matriculas: JSON.stringify(d.matriculas || []),
                    reservasHotel: JSON.stringify(d.reservasHotel || []),
                    contasPagar: JSON.stringify(d.contasPagar || []),
                    contasReceber: JSON.stringify(d.contasReceber || []),
                    contasPagarHotel: JSON.stringify(d.contasPagarHotel || []),
                    contasReceberHotel: JSON.stringify(d.contasReceberHotel || []),
                    pagamentos: JSON.stringify(d.pagamentos || []),
                    avaliacoes: JSON.stringify(d.avaliacoes || []),
                    avaliacoesCreche: JSON.stringify(d.avaliacoesCreche || []),
                    avaliacoesHotel: JSON.stringify(d.avaliacoesHotel || []),
                });
                await batch.commit();
            } catch(e) {
                console.error('Erro ao salvar:', e);
            }
        };
        const carregar = async () => {
            try {
                const doc = await db.collection('dados').doc('principal').get();
                if (!doc.exists) return null;
                const d = doc.data();
                return {
                    cadastros: JSON.parse(d.cadastros || '[]'),
                    matriculas: JSON.parse(d.matriculas || '[]'),
                    reservasHotel: JSON.parse(d.reservasHotel || '[]'),
                    contasPagar: JSON.parse(d.contasPagar || '[]'),
                    contasReceber: JSON.parse(d.contasReceber || '[]'),
                    contasPagarHotel: JSON.parse(d.contasPagarHotel || '[]'),
                    contasReceberHotel: JSON.parse(d.contasReceberHotel || '[]'),
                    pagamentos: JSON.parse(d.pagamentos || '[]'),
                    avaliacoes: JSON.parse(d.avaliacoes || '[]'),
                    avaliacoesCreche: JSON.parse(d.avaliacoesCreche || '[]'),
                    avaliacoesHotel: JSON.parse(d.avaliacoesHotel || '[]'),
                };
            } catch(e) {
                console.error('Erro ao carregar:', e);
                return null;
            }
        };
        const gerarCodFicha = (ult) => ((ult ? parseInt(ult) + 1 : 1)).toString().padStart(4, '0');
        const gerarCodPet = (ult) => 'P' + ((ult ? parseInt(String(ult).replace('P','')) + 1 : 1)).toString().padStart(3, '0');
        const formatReal = (v) => `R$ ${parseFloat(v || 0).toFixed(2).replace('.', ',')}`;
        const formatarValorInput = (valor) => {
            // Remove tudo exceto números
            const numeros = valor.replace(/\D/g, '');
            if (!numeros) return '';
            // Converte para centavos e depois para reais
            const valorEmCentavos = parseInt(numeros);
            const valorEmReais = (valorEmCentavos / 100).toFixed(2);
            return valorEmReais.replace('.', ',');
        };
        const calcIdade = (d, m, a) => {
            if (!d || !m || !a) return '';
            const hoje = new Date();
            const nasc = new Date(a, m - 1, d);
            let idade = hoje.getFullYear() - nasc.getFullYear();
            if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
            return idade >= 0 ? `${idade} anos` : '';
        };
        const busca = (termo, texto) => {
            if (!termo || !texto) return false;
            termo = termo.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            texto = texto.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            if (texto.includes(termo)) return true;
            const pt = termo.split(' ').filter(p => p.length > 0);
            const ptx = texto.split(' ').filter(p => p.length > 0);
            return pt.every(p1 => ptx.some(p2 => p2.includes(p1) || p1.length >= 3 && p2.startsWith(p1.substring(0, 3))));
        };
        
        // Busca universal tipo Google - procura em TUDO
        const buscarCadastroUniversal = (termo, cadastros) => {
            if (!termo || termo.trim().length === 0) return [];
            
            termo = termo.trim();
            const resultados = [];
            
            cadastros.forEach(cad => {
                let pontuacao = 0;
                let motivosEncontrados = [];
                
                // 1. Buscar por código de ficha (match exato tem prioridade máxima)
                if (cad.codigoFicha.toUpperCase() === termo.toUpperCase()) {
                    pontuacao += 100;
                    motivosEncontrados.push(`Código da ficha: ${cad.codigoFicha}`);
                } else if (cad.codigoFicha.toUpperCase().includes(termo.toUpperCase())) {
                    pontuacao += 50;
                    motivosEncontrados.push(`Código da ficha: ${cad.codigoFicha}`);
                }
                
                // 2. Buscar nos tutores
                cad.tutores.forEach(tutor => {
                    if (busca(termo, tutor.nome)) {
                        pontuacao += 30;
                        motivosEncontrados.push(`Tutor: ${tutor.nome}`);
                    }
                    if (tutor.apelido && busca(termo, tutor.apelido)) {
                        pontuacao += 25;
                        motivosEncontrados.push(`Apelido: ${tutor.apelido}`);
                    }
                    if (tutor.telefone && tutor.telefone.includes(termo.replace(/\D/g, ''))) {
                        pontuacao += 20;
                        motivosEncontrados.push(`Telefone: ${tutor.telefone}`);
                    }
                    if (tutor.cpf && tutor.cpf.replace(/\D/g, '').includes(termo.replace(/\D/g, ''))) {
                        pontuacao += 15;
                        motivosEncontrados.push(`CPF: ${tutor.cpf}`);
                    }
                });
                
                // 3. Buscar nos pets
                cad.pets.forEach(pet => {
                    if (pet.codigo && pet.codigo.toUpperCase() === termo.toUpperCase()) {
                        pontuacao += 80;
                        motivosEncontrados.push(`Código do pet: ${pet.codigo} (${pet.nome})`);
                    } else if (pet.codigo && pet.codigo.toUpperCase().includes(termo.toUpperCase())) {
                        pontuacao += 40;
                        motivosEncontrados.push(`Código do pet: ${pet.codigo} (${pet.nome})`);
                    }
                    
                    if (busca(termo, pet.nome)) {
                        pontuacao += 35;
                        motivosEncontrados.push(`Pet: ${pet.nome}`);
                    }
                    if (pet.raca && busca(termo, pet.raca)) {
                        pontuacao += 10;
                        motivosEncontrados.push(`Raça: ${pet.raca} (${pet.nome})`);
                    }
                });
                
                // Se encontrou algo, adiciona aos resultados
                if (pontuacao > 0) {
                    resultados.push({
                        cadastro: cad,
                        pontuacao: pontuacao,
                        motivos: motivosEncontrados
                    });
                }
            });
            
            // Ordenar por pontuação (maior pontuação primeiro)
            resultados.sort((a, b) => b.pontuacao - a.pontuacao);
            
            return resultados;
        };

                const primeiroDia = new Date(ano, mes, 1);

                const diasAnteriores = primeiroDia.getDay();
                const diasMes = ultimoDia.getDate();
                
                const dias = [];
                const mesAnterior = mes === 0 ? 11 : mes - 1;
                const anoAnterior = mes === 0 ? ano - 1 : ano;
                const ultimoDiaMesAnterior = new Date(anoAnterior, mesAnterior + 1, 0).getDate();
                
                for (let i = diasAnteriores - 1; i >= 0; i--) {
                    dias.push({ dia: ultimoDiaMesAnterior - i, mes: mesAnterior, ano: anoAnterior, outroMes: true });
                }
                
                for (let i = 1; i <= diasMes; i++) {
                    dias.push({ dia: i, mes, ano, outroMes: false });
                }
                
                const diasRestantes = 42 - dias.length;
                const proximoMes = mes === 11 ? 0 : mes + 1;
                const proximoAno = mes === 11 ? ano + 1 : ano;
                for (let i = 1; i <= diasRestantes; i++) {
                    dias.push({ dia: i, mes: proximoMes, ano: proximoAno, outroMes: true });
                }
                
                return dias;

                if (dias <= 0) return 0;
                
                let total = 0;
                pets.forEach((pet, index) => {
                    let valorPorDia;
                    
                    if (isPetMatriculadoCreche(pet.codigo)) {
                        valorPorDia = precos.hotel.petMatriculadoCreche;
                    } else if (index === 0) {
                        valorPorDia = precos.hotel.valorDia;

                    total += valorPorDia * dias;

                if (!frequencia || !pets || pets.length === 0) return 0;
                
                let maxDias = 0;
                let ehIntegral = false;
                
                Object.values(frequencia).forEach(freq => {
                    if (freq && typeof freq === 'object') {
                        const diasAtivos = Object.values(freq).filter(d => d && (d.manha || d.tarde)).length;
                        if (diasAtivos > maxDias) maxDias = diasAtivos;
                        // Se qualquer dia tiver manhã E tarde marcados = integral
                        Object.values(freq).forEach(d => {
                            if (d && d.manha && d.tarde) ehIntegral = true;
                        });
                    }
                });
                
                if (maxDias === 0) return 0;
                maxDias = Math.min(maxDias, 5);
                
                const numCaes = Math.min(pets.length, 3);
                const per = ehIntegral ? 'integral' : 'meio';
                
                const tabela = precos.creche.tabela;
                if (tabela[numCaes] && tabela[numCaes][per] && tabela[numCaes][per][maxDias]) {

                                                            <span className="bg-blue-600 text-white px-3 py-1 rounded-full text-xs font-bold ml-3 whitespace-nowrap">✏️ Editar</span>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                {cadastros.length === 0 ? (
                                    <div className="text-center py-12">
                                        <div className="text-6xl mb-4">📭</div>
                                        <p className="text-gray-500 text-lg">Nenhum cadastro ainda</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {(termoBuscaCad.trim().length >= 2 ? sugestoesBuscaCad.map(r => r.cadastro) : cadastros).map((cad) => (
                                            <div key={cad.id} className={`border-2 rounded-lg p-4 transition-all ${idEdicao === cad.id ? 'border-blue-400 bg-blue-50' : 'border-gray-200 hover:border-gray-300'}`}>
                                                <div className="flex justify-between items-start">
                                                    <div className="flex-1">
                                                        <p className="font-bold text-lg text-gray-800">📁 Ficha {cad.codigoFicha}</p>
                                                        <div className="text-sm text-gray-600 mt-1">
                                                            <span className="font-semibold">👤</span> {cad.tutores.map(t => t.nome + (t.telefone ? ` (${t.telefone})` : '')).join(' · ')}
                                                        </div>
                                                        <div className="text-sm text-gray-500 mt-0.5 flex flex-wrap gap-2">
                                                            {cad.pets.map((p, i) => {
                                                                const temMatricula = matriculas.some(m => m.codigoFicha === cad.codigoFicha && m.freq);
                                                                return (
                                                                    <span key={i} className="inline-flex items-center gap-1">
                                                                        {temMatricula && <span className="star text-sm">⭐</span>}🐕 {p.nome}
                                                                        {p.vacinas?.length > 0 && <span className="bg-green-100 text-green-700 text-xs px-1 rounded">💉{p.vacinas.length}</span>}
                                                                        {p.vermifugos?.length > 0 && <span className="bg-yellow-100 text-yellow-700 text-xs px-1 rounded">💊{p.vermifugos.length}</span>}
                                                                    </span>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2 ml-4 shrink-0">
                                                        <button
                                                            onClick={() => iniciarEdicao(cad)}
                                                            className="bg-blue-100 hover:bg-blue-600 text-blue-600 hover:text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors"
                                                        >
                                                            ✏️ Editar
                                                        </button>
                                                        <button
                                                            onClick={() => excluirCadastro(cad.id)}
                                                            className="bg-red-100 hover:bg-red-500 text-red-500 hover:text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors"
                                                        >
                                                            🗑️
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // AGENDA
            if (tela === 'agenda') {
                const mesNomes = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
                const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
                const diasDoMes = getDiasDoMes(mesAtual, anoAtual);
                
                // Função para buscar aniversários do dia
                const getAniversariosDia = (dia, mes) => {
                    const aniversarios = [];
                    
                    // Buscar pets com aniversário neste dia
                    cadastros.forEach(c => {
                        c.pets.forEach(p => {
                            if (parseInt(p.aniversarioDia) === dia && parseInt(p.aniversarioMes) === mes + 1) {
                                aniversarios.push({ tipo: 'pet', nome: p.nome, tutor: c.tutores[0].nome, ficha: c.codigoFicha });
                            }
                        });
                    });
                    
                    // Buscar tutores com aniversário (se tiver campo de aniversário)
                    // Por enquanto apenas pets
                    
                    return aniversarios;
                };
                
                // Função para buscar vacinas vencidas/vencendo no dia
                const getVacinasDia = (dia, mes, ano) => {
                    const dataStr = `${ano}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                    const vacinasDia = [];
                    cadastros.forEach(cad => {
                        cad.pets.forEach(pet => {
                            (pet.vacinas || []).forEach(vac => {
                                if (!vac.validade) return;
                                // converte DD/MM/AAAA -> YYYY-MM-DD
                                const parts = vac.validade.split('/');
                                if (parts.length !== 3) return;
                                const dataVac = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                                if (dataVac === dataStr) {
                                    vacinasDia.push({
                                        petNome: pet.nome,
                                        tutorNome: cad.tutores[0]?.nome || '—',
                                        ficha: cad.codigoFicha,
                                        vacina: vac.nome || 'Vacina',
                                        lembrarTutor: vac.lembrarTutor,
                                        vencida: dataVac < new Date().toISOString().split('T')[0]
                                    });
                                }
                            });
                        });
                    });
                    return vacinasDia;
                };

                // Função para buscar compromissos do dia
                const getCompromissosDia = (dia, mes, ano) => {
                    // Se está mostrando apenas aniversários
                    if (mostrarAniversarios) {
                        return { aniversarios: getAniversariosDia(dia, mes) };
                    }
                    // Se está mostrando apenas vacinas
                    if (mostrarVacinasAgenda) {
                        return { vacinas: getVacinasDia(dia, mes, ano) };
                    }
                    
                    const dataStr = `${ano}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                    
                    // Creche - Mensalidades
                    const mensalidadesCreche = matriculas.filter(m => parseInt(m.dia) === dia && m.freq);
                    
                    // Creche - Outras receitas
                    const receitasCreche = contasReceber.filter(c => c.data === dataStr);
                    
                    // Creche - Avaliações
                    const avsDiaCreche = avaliacoesCreche.filter(a => a.data === dataStr);
                    
                    // Hotel - Avaliações
                    const avsDiaHotel = avaliacoesHotel.filter(a => a.data === dataStr);
                    
                    // Hotel - Reservas reais do array reservasHotel
                    const reservasHotelDia = reservasHotel.filter(r => {
                        if (!r.checkIn) return false;
                        if (r.checkIn === dataStr) return true; // check-in hoje
                        if (r.checkOut === dataStr) return true; // check-out hoje
                        // hospedado neste período
                        if (r.checkOut) return dataStr > r.checkIn && dataStr < r.checkOut;
                        return false;
                    });
                    
                    // Contas a pagar (geral)
                    const despesas = contasPagar.filter(c => c.data === dataStr);
                    
                    // Contasreceber do hotel (para identificar separadamente)
                    const receitasHotel = contasReceber.filter(c => c.data === dataStr && c.tipo === 'hotel');
                    const receitasOutras = contasReceber.filter(c => c.data === dataStr && c.tipo !== 'hotel');
                    
                    return {
                        creche: { mensalidades: mensalidadesCreche, receitas: receitasOutras, avaliacoes: avsDiaCreche },
                        hotel: { reservas: reservasHotelDia, receitas: receitasHotel, avaliacoes: avsDiaHotel },
                        despesas: despesas
                    };
                };

                                    <button

                                        className={`px-6 py-3 rounded-lg font-bold transition-all ${
                                            mostrarVacinasAgenda 
                                            ? 'bg-red-600 text-white shadow-lg transform scale-105' 
                                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                                        }`}
                                    >
                                        💉 {mostrarVacinasAgenda ? 'Vacinas (Ativo)' : 'Vacinas'}
                                    </button>
                                    <button onClick={() => setTela('menu')} className="bg-gray-500 text-white px-6 py-2 rounded-lg">← Voltar</button>
                                </div>
                            </div>
                            
                            {/* CALENDÁRIO */}
                            <div className="bg-white rounded-lg shadow-lg p-6 mb-6">

                                    <div className="flex gap-4">
                                        <button onClick={() => { if (mesAtual === 0) { setMesAtual(11); setAnoAtual(anoAtual - 1); } else { setMesAtual(mesAtual - 1); } }} className="bg-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300">← Anterior</button>
                                        <button onClick={() => { setMesAtual(new Date().getMonth()); setAnoAtual(new Date().getFullYear()); }} className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">Hoje</button>
                                        <button onClick={() => { if (mesAtual === 11) { setMesAtual(0); setAnoAtual(anoAtual + 1); } else { setMesAtual(mesAtual + 1); } }} className="bg-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300">Próximo →</button>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-7 gap-0 border rounded-lg overflow-hidden">
                                    {diasSemana.map(d => (<div key={d} className="calendar-header bg-green-600">{d}</div>))}
                                    {diasDoMes.map((diaObj, idx) => {
                                        const compromissos = getCompromissosDia(diaObj.dia, diaObj.mes, diaObj.ano);
                                        const classes = `calendar-day ${diaObj.outroMes ? 'other-month' : ''} ${isHoje(diaObj.dia, diaObj.mes, diaObj.ano) ? 'today' : ''} ${isSelecionado(diaObj.dia, diaObj.mes, diaObj.ano) ? 'selected' : ''}`;
                                        
                                        // Se está mostrando aniversários
                                        if (mostrarAniversarios) {
                                            const aniversarios = compromissos.aniversarios || [];
                                            return (
                                                <div key={idx} className={classes} onClick={() => selecionarDia(diaObj)}>
                                                    <div className="calendar-num">{diaObj.dia}</div>
                                                    {aniversarios.slice(0, 3).map((a, i) => (
                                                        <div key={i} className="calendar-event" style={{ backgroundColor: '#ec4899' }}>
                                                            🎂 {a.nome}
                                                        </div>
                                                    ))}
                                                    {aniversarios.length > 3 && <div className="text-xs text-gray-500">+{aniversarios.length - 3} mais</div>}
                                                </div>
                                            );
                                        }
                                        
                                        // Modo vacinas no calendário
                                        if (mostrarVacinasAgenda) {
                                            const vacinas = compromissos.vacinas || [];
                                            const vencidas = vacinas.filter(v => v.vencida);
                                            const aVencer = vacinas.filter(v => !v.vencida);
                                            return (
                                                <div key={idx} className={classes} onClick={() => selecionarDia(diaObj)}>
                                                    <div className="calendar-num">{diaObj.dia}</div>

                                                        <div key={i} className="calendar-event" style={{ backgroundColor: '#dc2626' }}>
                                                            💉 {v.petNome}
                                                        </div>

                                                    {aVencer.slice(0, 2).map((v, i) => (
                                                        <div key={i} className="calendar-event" style={{ backgroundColor: '#f59e0b' }}>
                                                            💉 {v.petNome}
                                                        </div>
                                                    ))}
                                                    {vacinas.length > 4 && <div className="text-xs text-gray-500">+{vacinas.length - 4} mais</div>}
                                                </div>
                                            );
                                        }

                                        const temAvaliacaoCreche = (compromissos.creche.avaliacoes||[]).length > 0;
                                        const temAvaliacaoHotel = (compromissos.hotel.avaliacoes||[]).length > 0;
                                        const temMensalidade = compromissos.creche.mensalidades.length > 0;
                                        const temReceita = compromissos.creche.receitas.length > 0;
                                        const temHotel = compromissos.hotel.reservas.length > 0;
                                        const temReceitaHotel = (compromissos.hotel.receitas || []).length > 0;
                                        const temDespesa = compromissos.despesas.length > 0;
                                        const temVacina = !mostrarVacinasAgenda && getVacinasDia(diaObj.dia, diaObj.mes, diaObj.ano).length > 0;
                                        const temAniversario = !mostrarAniversarios && getAniversariosDia(diaObj.dia, diaObj.mes).length > 0;

                                        const temHotelAlgo = temHotel || temReceitaHotel || temAvaliacaoHotel;
                                        const temCrecheAlgo = temMensalidade || temReceita || temAvaliacaoCreche;

                                        return (
                                            <div key={idx} className={classes} onClick={() => { selecionarDia(diaObj); setTimeout(()=>{ const el=document.getElementById('compromissos-dia'); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },100); }} style={{padding:'2px', minHeight:'80px'}}>
                                                <div className="calendar-num" style={{fontSize:'12px',fontWeight:'600',marginBottom:'2px'}}>{diaObj.dia}</div>

                                                    <div style={{flex:1,borderRight:'1px solid #e5e7eb',paddingRight:'2px'}}>
                                                        {temHotel && <div style={{fontSize:'7px',background:'#3b82f6',color:'white',borderRadius:'2px',padding:'1px 2px',marginBottom:'1px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>🏨 Hotel</div>}
                                                        {temReceitaHotel && <div style={{fontSize:'7px',background:'#1d4ed8',color:'white',borderRadius:'2px',padding:'1px 2px',marginBottom:'1px'}}>💰</div>}
                                                        {temAvaliacaoHotel && <div style={{fontSize:'7px',background:'#0ea5e9',color:'white',borderRadius:'2px',padding:'1px 2px',marginBottom:'1px'}}>🔍</div>}
                                                        {temDespesa && <div style={{fontSize:'7px',background:'#ef4444',color:'white',borderRadius:'2px',padding:'1px 2px',marginBottom:'1px'}}>💸</div>}
                                                        {temVacina && <div style={{fontSize:'7px',background:'#dc2626',color:'white',borderRadius:'2px',padding:'1px 2px',marginBottom:'1px'}}>💉</div>}
                                                        {temAniversario && <div style={{fontSize:'7px',background:'#ec4899',color:'white',borderRadius:'2px',padding:'1px 2px',marginBottom:'1px'}}>🎂</div>}
                                                    </div>
                                                    {/* LADO DIREITO — CRECHE */}
                                                    <div style={{flex:1,paddingLeft:'2px'}}>
                                                        {temMensalidade && <div style={{fontSize:'7px',background:'#a855f7',color:'white',borderRadius:'2px',padding:'1px 2px',marginBottom:'1px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>🎨 Creche</div>}
                                                        {temReceita && <div style={{fontSize:'7px',background:'#7c3aed',color:'white',borderRadius:'2px',padding:'1px 2px',marginBottom:'1px'}}>💰</div>}
                                                        {temAvaliacaoCreche && <div style={{fontSize:'7px',background:'#8b5cf6',color:'white',borderRadius:'2px',padding:'1px 2px',marginBottom:'1px'}}>🔍</div>}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                {dataSelecionada && (
                                    <div className="mt-4 bg-green-50 p-4 rounded-lg">
                                        <p className="text-lg font-bold">📅 Dia selecionado: {dataSelecionada.dia}/{dataSelecionada.mes + 1}/{dataSelecionada.ano}</p>
                                    </div>
                                )}
                            </div>
                            
                            {/* COMPROMISSOS DO DIA SELECIONADO */}
                            {dataSelecionada && (
                                <div id="compromissos-dia" className="bg-white rounded-lg shadow-lg p-6 mb-6">
                                    <h3 className="text-2xl font-bold mb-6">
                                        {mostrarAniversarios ? '🎂 Aniversários de ' : mostrarVacinasAgenda ? '💉 Vacinas de ' : 'Compromissos de '}
                                        {dataSelecionada.dia}/{dataSelecionada.mes + 1}/{dataSelecionada.ano}
                                    </h3>
                                    
                                    {(() => {
                                        const comp = getCompromissosDia(dataSelecionada.dia, dataSelecionada.mes, dataSelecionada.ano);
                                        
                                        // Se está mostrando aniversários
                                        if (mostrarAniversarios) {
                                            const aniversarios = comp.aniversarios || [];
                                            if (aniversarios.length === 0) {
                                                return (
                                                    <div className="text-center py-12">
                                                        <div className="text-6xl mb-4">🎂</div>
                                                        <p className="text-gray-500 text-lg">Nenhum aniversário neste dia</p>
                                                    </div>
                                                );
                                            }
                                            
                                            return (
                                                <div className="bg-pink-50 p-6 rounded-lg border-2 border-pink-300">
                                                    <h4 className="text-xl font-bold text-pink-700 mb-4">🎂 Aniversariantes do Dia</h4>
                                                    <div className="space-y-3">
                                                        {aniversarios.map((a, idx) => (
                                                            <div key={idx} className="bg-white p-4 rounded-lg border border-pink-200">
                                                                <div className="flex items-center gap-3">
                                                                    <div className="text-4xl">🎂</div>
                                                                    <div className="flex-1">
                                                                        <p className="font-bold text-lg text-pink-700">
                                                                            {a.tipo === 'pet' ? '🐕 ' : '👤 '}{a.nome}
                                                                        </p>
                                                                        <p className="text-sm text-gray-600">Tutor: {a.tutor}</p>
                                                                        <p className="text-xs text-gray-500">Ficha: {a.ficha}</p>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        }
                                        
                                        // Modo vacinas — detalhe do dia
                                        if (mostrarVacinasAgenda) {
                                            const vacinas = comp.vacinas || [];
                                            if (vacinas.length === 0) {
                                                return (
                                                    <div className="text-center py-12">
                                                        <div className="text-6xl mb-4">💉</div>
                                                        <p className="text-gray-500 text-lg">Nenhuma vacina vence neste dia</p>
                                                    </div>
                                                );
                                            }
                                            const vencidas = vacinas.filter(v => v.vencida);
                                            const aVencer = vacinas.filter(v => !v.vencida);
                                            return (
                                                <div className="space-y-3">
                                                    {vencidas.length > 0 && (
                                                        <div className="bg-red-50 border-2 border-red-300 rounded-lg p-4">
                                                            <h4 className="font-bold text-red-700 mb-3">🚨 Vacinas Vencidas ({vencidas.length})</h4>
                                                            {vencidas.map((v, i) => (
                                                                <div key={i} className="bg-white rounded-lg p-3 mb-2 border border-red-200 flex justify-between items-center">
                                                                    <div>
                                                                        <p className="font-bold">💉 {v.vacina} — <span className="text-purple-700">🐕 {v.petNome}</span></p>
                                                                        <p className="text-sm text-gray-600">👤 {v.tutorNome} &nbsp;|&nbsp; Ficha: {v.ficha}</p>
                                                                        {v.lembrarTutor && <p className="text-xs text-orange-600 mt-1">🔔 Tutor quer ser lembrado</p>}
                                                                    </div>
                                                                    <span className="bg-red-100 text-red-700 text-xs px-2 py-1 rounded-full font-bold">VENCIDA</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                    {aVencer.length > 0 && (
                                                        <div className="bg-yellow-50 border-2 border-yellow-300 rounded-lg p-4">
                                                            <h4 className="font-bold text-yellow-700 mb-3">⚠️ Vacinas que Vencem Hoje ({aVencer.length})</h4>
                                                            {aVencer.map((v, i) => (
                                                                <div key={i} className="bg-white rounded-lg p-3 mb-2 border border-yellow-200 flex justify-between items-center">
                                                                    <div>
                                                                        <p className="font-bold">💉 {v.vacina} — <span className="text-purple-700">🐕 {v.petNome}</span></p>
                                                                        <p className="text-sm text-gray-600">👤 {v.tutorNome} &nbsp;|&nbsp; Ficha: {v.ficha}</p>

            // TELA DE GESTÃO
            if (tela === 'gestao') {
                // Função para gerar relatório com filtro por empresa
                const gerarRelatorio = (filtro = filtroRelatorio) => {
                    if (!dataInicioRelatorio || !dataFimRelatorio) return null;
                    
                    const inicio = new Date(dataInicioRelatorio);
                    const fim = new Date(dataFimRelatorio);
                    fim.setHours(23,59,59);

                    // Mensalidades creche (matriculas com freq)
                    const recCreche = matriculas.filter(m => {
                        if (!m.freq) return false;
                        const d = new Date(m.data || m.checkIn);
                        return d >= inicio && d <= fim;
                    });

                    // Hospedagens hotel (reservasHotel)
                    const recHotel = reservasHotel.filter(r => {
                        const d = new Date(r.checkIn || r.data);
                        return d >= inicio && d <= fim;
                    });

                    // Contas a receber extras
                    const recExtras = contasReceber.filter(c => {
                        const d = new Date(c.data);
                        return d >= inicio && d <= fim;
                    });

                    // Dividir extras: hotel vs outros
                    const recExtrasHotel = recExtras.filter(c => c.tipo === 'hotel');
                    const recExtrasOutras = recExtras.filter(c => c.tipo !== 'hotel');

                    // Despesas
                    const despesasPeriodo = contasPagar.filter(c => {
                        const d = new Date(c.data);
                        return d >= inicio && d <= fim;
                    });

                    // Aplicar filtro de empresa
                    let receitasA = [], receitasB = [], despesasA = [];
                    if (filtro === 'creche') {
                        receitasA = recCreche; // mensalidades (tipo 'receber')
                        receitasB = recExtrasOutras; // outras (tipo 'receber-extra')
                        despesasA = despesasPeriodo; // todas (sem separação por empresa ainda)
                    } else if (filtro === 'hotel') {
                        receitasA = recHotel; // reservas hotel
                        receitasB = recExtrasHotel; // contas extras hotel
                        despesasA = despesasPeriodo;
                    } else {
                        receitasA = [...recCreche, ...recHotel];
                        receitasB = recExtras;
                        despesasA = despesasPeriodo;
                    }

                    // Calcular totais — recCreche usa valorTotal (número), hotel usa valorTotal, extras usam c.valor (string)
                    const somarReceitas = (list) => list.reduce((acc, item) => {
                        const v = item.valorTotal != null ? (item.valorTotal || 0) : parseFloat((item.valor || '0').replace(',','.'));
                        return acc + v;
                    }, 0);

                    const totalReceitas = somarReceitas(receitasA) + somarReceitas(receitasB);
                    const totalDespesas = despesasA.reduce((acc, c) => acc + parseFloat((c.valor || '0').replace(',','.')), 0);
                    const saldo = totalReceitas - totalDespesas;

                    // Recebidos / pendentes
                    const recebidosA = receitasA.filter(item => {
                        if (item.freq != null) return isPago(item.id, 'receber'); // matricula creche
                        return isPago(item.id, 'receber-extra'); // hotel ou extra
                    });
                    const recebidosB = receitasB.filter(c => isPago(c.id, 'receber-extra'));
                    const receitasRecebidas = somarReceitas(recebidosA) + somarReceitas(recebidosB);
                    const receitasPendentes = totalReceitas - receitasRecebidas;

                    const despesasPagas = despesasA.filter(c => isPago(c.id, 'pagar')).reduce((acc, c) => acc + parseFloat((c.valor||'0').replace(',','.')), 0);
                    const despesasPendentes = totalDespesas - despesasPagas;

                    // Lançamentos detalhados para o modal
                    const lancamentosReceitas = [
                        ...recCreche.filter(() => filtro !== 'hotel').map(m => ({
                            id: m.id, tipo: 'receber', categoria: '🎨 Creche - Mensalidade',
                            descricao: `${m.tutores?.[0]?.nome || '—'} (Ficha ${m.codigoFicha})`,
                            data: m.data || m.checkIn,
                            valor: m.valorTotal || 0,
                            pago: isPago(m.id, 'receber')
                        })),
                        ...recHotel.filter(() => filtro !== 'creche').map(r => ({
                            id: r.id, tipo: 'receber-extra', categoria: '🏨 Hotel - Hospedagem',
                            descricao: `${r.tutores?.[0]?.nome || r.nomeTutor || '—'} · ${r.pets?.map(p=>p.nome).join(', ')}`,
                            data: r.checkIn,
                            valor: r.valorTotal || 0,
                            pago: (() => { const c = contasReceber.find(x => x.reservaId === r.id); return c ? isPago(c.id,'receber-extra') : false; })()
                        })),
                        ...recExtras.filter(c => filtro === 'geral' || (filtro === 'hotel' && c.tipo === 'hotel') || (filtro === 'creche' && c.tipo !== 'hotel')).map(c => ({
                            id: c.id, tipo: 'receber-extra',
                            categoria: c.tipo === 'hotel' ? '🏨 Hotel - Outros' : '💰 Outras Receitas',
                            descricao: c.descricao,
                            data: c.data,
                            valor: parseFloat((c.valor||'0').replace(',','.')),
                            pago: isPago(c.id, 'receber-extra')
                        }))
                    ].sort((a,b) => (a.data||'').localeCompare(b.data||''));

                    const lancamentosDespesas = despesasA.map(c => ({
                        id: c.id, tipo: 'pagar',
                        categoria: c.tipo === 'fixa' ? '🔒 Despesa Fixa' : '📝 Despesa Variável',
                        descricao: c.descricao,
                        data: c.data,
                        valor: parseFloat((c.valor||'0').replace(',','.')),
                        pago: isPago(c.id, 'pagar')
                    })).sort((a,b) => (a.data||'').localeCompare(b.data||''));

                    return {
                        totalReceitas, totalDespesas, saldo,
                        receitasRecebidas, receitasPendentes,
                        despesasPagas, despesasPendentes,
                        qtdReceitas: receitasA.length + receitasB.length,
                        qtdDespesas: despesasA.length,
                        lancamentosReceitas, lancamentosDespesas
                    };
                };
                
                const relatorio = gerarRelatorio();
                
                return (
                    <>
                    <div className="min-h-screen bg-gradient-to-br from-orange-50 to-orange-100 p-6">

                                    </button>
                                    <button

                                            empresaSelecionada === 'creche'

                                        🎨 Creche $

                                </div>
                            </div>
                            
                            {/* CONFIGURAÇÃO DE PREÇOS */}
                            <div className="bg-white rounded-lg shadow-lg p-6 mb-6">

                                {empresaSelecionada === 'hotel' ? (
                                    <div>

                                            onClick={() => setMostrarPrecosHotel(!mostrarPrecosHotel)}
                                            className={`w-full p-4 rounded-lg font-bold text-lg mb-4 transition-all ${

                                                : 'bg-blue-100 text-blue-700 hover:bg-blue-200'
                                            }`}
                                        >
                                            🏨 {mostrarPrecosHotel ? '▼' : '▶'} Preços do Hotel
                                        </button>
                                        
                                        {mostrarPrecosHotel && (
                                            <div className="bg-blue-50 p-6 rounded-lg">
                                                <div className="grid grid-cols-3 gap-6 mb-4">
                                                    <div>
                                                        <label className="block text-sm font-semibold mb-2 text-blue-700">Valor por Pet/Dia</label>
                                                        <div className="relative">
                                                            <span className="absolute left-3 top-3 text-gray-600 font-bold">R$</span>
                                                            <input 
                                                                type="number" 
                                                                value={precos.hotel.valorDia} 
                                                                onChange={(e) => setPrecos({...precos, hotel: { ...precos.hotel, valorDia: parseFloat(e.target.value) || 0 }})}
                                                                className="w-full px-4 py-3 pl-12 border-2 border-blue-300 rounded-lg text-lg font-bold"
                                                            />
                                                        </div>
                                                        <p className="text-xs text-gray-600 mt-2">Valor padrão por pet/dia</p>
                                                    </div>
                                                    
                                                    <div>
                                                        <label className="block text-sm font-semibold mb-2 text-blue-700">Pet Adicional</label>
                                                        <div className="relative">
                                                            <span className="absolute left-3 top-3 text-gray-600 font-bold">R$</span>

                                                                className="w-full px-4 py-3 pl-12 border-2 border-blue-300 rounded-lg text-lg font-bold"
                                                            />
                                                        </div>
                                                        <p className="text-xs text-gray-600 mt-2">Desconto para 2º pet em diante</p>
                                                    </div>
                                                    
                                                    <div>
                                                        <label className="block text-sm font-semibold mb-2 text-blue-700">Pet Matriculado Creche</label>
                                                        <div className="relative">
                                                            <span className="absolute left-3 top-3 text-gray-600 font-bold">R$</span>
                                                            <input

                                                                value={precos.hotel.petMatriculadoCreche}

                                                            />
                                                        </div>
                                                        <p className="text-xs text-gray-600 mt-2">Preço diferenciado</p>
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-blue-100 p-4 rounded-lg">
                                                    <p className="text-sm text-blue-700 font-semibold mb-2">💡 Exemplo de Cálculo (3 dias):</p>

                        if (dia.tarde) total++;

                    return total;

                    if (!formReservaRapida.nomeTutor.trim()) { alert('⚠️ Informe o nome do tutor!'); return; }
                    if (!formReservaRapida.telefone.trim()) { alert('⚠️ Informe o telefone!'); return; }

                    const petsValidos = formReservaRapida.pets.filter(p => p.nome.trim());

                        tutores: [{ nome: formReservaRapida.nomeTutor, telefone: formReservaRapida.telefone }],

                        valorTotal,

                    alert('✅ Reserva rápida confirmada!');

            const mesHoje = meses[hoje.getMonth()];
            const anoHoje = hoje.getFullYear();
            
            let ehIntegral = false;
            let maxDias = 0;
            if (matricula.freq) {

                        const d = Object.values(freq).filter(d => d && (d.manha || d.tarde)).length;
                        if (d > maxDias) maxDias = d;
                        Object.values(freq).forEach(d => { if (d && d.manha && d.tarde) ehIntegral = true; });

            const plano = `${ehIntegral ? 'Integral' : 'Meio Período'} - ${maxDias}x por semana`;

                const win = window.open('', '_blank', 'width=900,height=700');

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Contrato - ${tutor.nome || 'Casa do Tio'}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; color: #000; background: white; }

    .contrato-pagina:not(:first-child) { page-break-before: always !important; break-before: page !important; }

    position: fixed; top: 0; left: 0; right: 0;
    background: #4f46e5; color: white; padding: 10px 20px;
    display: flex; gap: 12px; justify-content: flex-end; align-items: center;
    z-index: 9999;
  }
  .no-print button { padding: 8px 24px; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; }
  .btn-print { background: #10b981; color: white; }
  .btn-close { background: #6b7280; color: white; }
  .contrato-wrap { padding: 60px 72px 40px; }
</style>
</head>
<body>
<div class="no-print">
  <span style="flex:1;font-weight:bold">📄 Contrato — ${tutor.nome || ''}</span>
  <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
  <button class="btn-close" onclick="window.close()">✕ Fechar</button>
</div>
<div class="contrato-wrap">
  ${area.innerHTML}
</div>
</body>
</html>`);
                win.document.close();
                win.focus();
            };

            const S = {
                label: { fontSize:11 },
                linha: { borderBottom:'1px solid #000', display:'inline-block', minWidth:60, fontSize:11 },
                secTit: { fontWeight:'bold', fontSize:12, borderBottom:'2px solid #000', paddingBottom:4, marginBottom:10, textDecoration:'underline' },
                p: { fontSize:11, textAlign:'justify', marginBottom:8 },

            const Linha = ({label, valor, width}) => (
                <div style={{marginBottom:7}}>
                    <span style={S.label}>{label} </span>
                    <span style={{...S.linha, width: width||'auto', minWidth:120}}>{valor||''}</span>

            const Grid = ({cols}) => (

                    {cols.map((c,i)=>(
